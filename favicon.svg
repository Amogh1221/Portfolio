<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <!-- Teal → Emerald gradient (matches portfolio brand) -->
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>

    <!-- Soft radial glow behind the symbol -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#14b8a6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>

    <!-- Clip to rounded square -->
    <clipPath id="clip">
      <rect width="64" height="64" rx="14"/>
    </clipPath>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="64" height="64" rx="14" fill="#02080a"/>

  <!-- Subtle grid lines (echoes the hero background) -->
  <g clip-path="url(#clip)" opacity="0.07" stroke="#14b8a6" stroke-width="0.5">
    <line x1="0"  y1="16" x2="64" y2="16"/>
    <line x1="0"  y1="32" x2="64" y2="32"/>
    <line x1="0"  y1="48" x2="64" y2="48"/>
    <line x1="16" y1="0"  x2="16" y2="64"/>
    <line x1="32" y1="0"  x2="32" y2="64"/>
    <line x1="48" y1="0"  x2="48" y2="64"/>
  </g>

  <!-- Radial glow behind symbol -->
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <!-- Gradient border ring -->
  <rect x="1" y="1" width="62" height="62" rx="13"
        fill="none"
        stroke="url(#brand)"
        stroke-width="1.5"
        opacity="0.5"/>

  <!-- ─── </ > symbol ─── -->
  <!-- Left bracket  < -->
  <polyline
    points="11,22 20,32 11,42"
    fill="none"
    stroke="url(#brand)"
    stroke-width="4.2"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Slash  / -->
  <line
    x1="27" y1="44"
    x2="37" y2="20"
    stroke="url(#brand)"
    stroke-width="4.2"
    stroke-linecap="round"/>

  <!-- Right bracket  > -->
  <polyline
    points="53,22 44,32 53,42"
    fill="none"
    stroke="url(#brand)"
    stroke-width="4.2"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Small teal dot accent (bottom-right corner) -->
  <circle cx="54" cy="54" r="3.5" fill="#14b8a6" opacity="0.6"/>
</svg>
